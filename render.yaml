services:
  - type: web
    name: restaurant-scraper-mcp
    runtime: python
    rootDir: .
    buildCommand: pip install -r mcp_requirements.txt
    startCommand: python mcp_server.py --http
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: restaurant-scraper-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 300
    envVars:
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        value: ""
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
